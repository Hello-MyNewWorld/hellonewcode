<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHive - Smart Note Taking</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
</head>
<body>
    <!-- Authentication Screen -->
    <div id="auth-screen" class="screen active">
        <div class="auth-container">
            <h1><i class="fas fa-bee"></i> NoteHive</h1>
            <p>Your smart note-taking companion</p>
            <div class="auth-form">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email address" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button id="login-btn" class="btn primary">Login</button>
                <button id="signup-btn" class="btn secondary">Sign Up</button>
                <div class="divider">or</div>
                <button id="google-login-btn" class="btn google">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
            </div>
            <div id="auth-message" class="message"></div>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="app-screen" class="screen">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-bee"></i> NoteHive</h2>
                <button id="new-note-btn" class="btn icon-only">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search notes...">
                <i class="fas fa-search"></i>
            </div>
            
            <div class="nav-menu">
                <ul>
                    <li class="nav-item active" data-view="notes">
                        <i class="fas fa-sticky-note"></i> Notes
                    </li>
                    <li class="nav-item" data-view="todos">
                        <i class="fas fa-tasks"></i> To-Dos
                    </li>
                    <li class="nav-item" data-view="stats">
                        <i class="fas fa-chart-bar"></i> Statistics
                    </li>
                </ul>
            </div>
            
            <div class="tags-section">
                <h3>Tags</h3>
                <div id="tags-list" class="tags-container">
                    <!-- Tags will be populated here -->
                </div>
            </div>
            
            <div class="pomodoro-widget">
                <h3>Pomodoro Timer</h3>
                <div id="pomodoro-display">25:00</div>
                <div class="pomodoro-controls">
                    <button id="start-timer-btn" class="btn small">Start</button>
                    <button id="pause-timer-btn" class="btn small">Pause</button>
                    <button id="reset-timer-btn" class="btn small">Reset</button>
                </div>
            </div>
            
            <div class="user-profile">
                <div class="user-info">
                    <div class="avatar" id="user-avatar"></div>
                    <div class="user-details">
                        <span id="user-name">User Name</span>
                        <span id="user-email">user@example.com</span>
                    </div>
                </div>
                <div class="theme-toggle">
                    <i class="fas fa-sun"></i>
                    <input type="checkbox" id="theme-toggle" class="theme-checkbox">
                    <label for="theme-toggle" class="theme-switch"></label>
                    <i class="fas fa-moon"></i>
                </div>
                <button id="logout-btn" class="btn icon-only">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
        
        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Notes View -->
            <div id="notes-view" class="view active">
                <div class="view-header">
                    <h2>All Notes</h2>
                    <div class="view-actions">
                        <select id="sort-notes">
                            <option value="modified">Last Modified</option>
                            <option value="created">Date Created</option>
                            <option value="title">Title A-Z</option>
                        </select>
                    </div>
                </div>
                <div id="notes-grid" class="notes-grid">
                    <!-- Notes will be populated here -->
                </div>
            </div>
            
            <!-- To-Dos View -->
            <div id="todos-view" class="view">
                <div class="view-header">
                    <h2>To-Do List</h2>
                    <button id="add-todo-btn" class="btn primary">Add Task</button>
                </div>
                <div id="todos-container" class="todos-container">
                    <!-- Todos will be populated here -->
                </div>
            </div>
            
            <!-- Stats View -->
            <div id="stats-view" class="view">
                <div class="view-header">
                    <h2>Statistics</h2>
                </div>
                <div class="stats-dashboard">
                    <div class="stat-card">
                        <h3>Total Notes</h3>
                        <div id="total-notes" class="stat-value">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Todos</h3>
                        <div id="total-todos" class="stat-value">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Completed Todos</h3>
                        <div id="completed-todos" class="stat-value">0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Most Used Tag</h3>
                        <div id="most-used-tag" class="stat-value">None</div>
                    </div>
                    <div class="stat-chart">
                        <canvas id="notes-chart"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- Note Editor -->
            <div id="note-editor" class="editor-overlay">
                <div class="editor-container">
                    <div class="editor-header">
                        <input type="text" id="note-title" placeholder="Note Title">
                        <div class="editor-actions">
                            <button id="attach-file-btn" class="btn secondary">
                                <i class="fas fa-paperclip"></i> Attach File
                            </button>
                            <button id="save-note-btn" class="btn primary">Save</button>
                            <button id="close-editor-btn" class="btn secondary">Cancel</button>
                        </div>
                    </div>
                    <div class="editor-tags">
                        <input type="text" id="note-tags" placeholder="Add tags (comma separated)">
                    </div>
                    <div class="editor-content">
                        <textarea id="note-content" placeholder="Start writing your note..."></textarea>
                    </div>
                    <div class="editor-files" id="editor-files-container">
                        <h4>Attached Files</h4>
                        <div id="attached-files-list"></div>
                    </div>
                </div>
                
                <!-- File Input (Hidden) -->
                <input type="file" id="file-input" style="display: none;" accept="*/*">
            </div>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.skypack.dev/@supabase/supabase-js@2"></script>
    
    <!-- Chart.js for statistics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Main App Script -->
    <script type="module" src="js/supabase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/editor.js"></script>
    <script type="module" src="js/todos.js"></script>
    <script type="module" src="js/stats.js"></script>
    <script type="module" src="js/pomodoro.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
